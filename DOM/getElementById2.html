<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getElementById2</title>
</head>
<body>
    <div id="main">
        <p>para 1</p>
        <h1>heading 1</h1>
        <p>para 2</p>
    </div>

    <p id='demo'></p>

    <script>
        const x=document.getElementById('main');
        const y=x.getElementsByTagName('p');
        document.getElementById('demo').innerHTML='The first element is '+
        y[0].innerHTML;
    </script>
</body>
</html>
