<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getElementById</title>
</head>
<body>
    <p id="p1">Hello</p>
    <script>
        const myPara=document.getElementById('p1');
        // myPara.innerHTML='Avinash';
        myPara.innerHTML+=' Avinash';
        myPara.style.color='red';
        myPara.style.fontSize='50px';
        myPara.style.backgroundColor='yellow';
        myPara.style.textAlign='center';
    </script>
</body>
</html>
