<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>querySelector</title>
</head>
<body>
    <p class="demo"></p>
    <script>
        const myPara=document.querySelector('.demo');
        myPara.innerHTML='welcome to query selector'
    </script>
</body>
</html>
