<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>querySelectorAll</title>
</head>
<body>
    <p class='para'>one</p>
    <p class='para'>two</p>
    <p class='para'>three</p>

    <script>
        const myItems=document.querySelectorAll('.para');
        myItems[0].innerHTML='first element';
        myItems[0].style.backgroundColor='yellow';
        myItems[0].style.color='blue';
        myItems[0].style.fontSize='30px';
        myItems[0].style.textAlign='center';

        myItems[2].innerHTML='third element';
        myItems[1].style.color='red';
        myItems[1].style.fontSize='40px';
    </script>
</body>
</html>
