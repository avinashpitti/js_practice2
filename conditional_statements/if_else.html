<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if else statement</title>
</head>
<body>
    <script>
        // used when we want 2 possible results
        let marks=34
        if(marks>=40){
            console.log('You qualified the exam')
        }else{
            console.log('You disqualified the exam')
        }
    </script>
</body>
</html>
