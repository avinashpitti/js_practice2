<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>undefined</title>
</head>
<body>
    <script>
        // undefined:A variable is declared but no value is assigned yet
        let x;
        console.log(x) // undefined
        x=21;
        console.log(x) // 21

        function greet(){
            // no code
        }

        console.log(greet()) // undefined
    </script>
</body>
</html>
